<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manga Localization — Overlay Viewer</title>
  <style>
    :root { --chrome: #1e1e22; --accent: #6ee7b7; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--chrome); color: #e6e6e6;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    header { padding: 12px 16px; border-bottom: 1px solid #33333a; }
    header h1 { font-size: 15px; margin: 0 0 4px; font-weight: 600; }
    header .meta { font-size: 12px; color: #9a9aa2; }
    header code { color: var(--accent); }
    .wrap { padding: 20px; display: flex; justify-content: center; }
    /* Stage is sized to the image's natural pixel dimensions; absolute
       bubble divs are positioned in those same pixel coordinates. The whole
       stage is scaled to fit the viewport via CSS transform. */
    #stage {
      position: relative; transform-origin: top left;
      background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }
    #stage img { display: block; width: 100%; height: 100%; }
    .bubble {
      position: absolute; display: flex; align-items: center; justify-content: center;
      text-align: center; overflow: hidden; padding: 2px; line-height: 1.15;
      color: #000; font-family: "Noto Naskh Arabic", "Segoe UI", Tahoma, sans-serif;
      /* faint guide so empty/short bubbles are still locatable */
      outline: 1px dashed rgba(0,0,0,.12);
    }
    .err { padding: 24px; color: #ff8585; font-family: ui-monospace, monospace; white-space: pre-wrap; }
    .hint { padding: 24px; color: #9a9aa2; max-width: 720px; line-height: 1.5; }
    .hint code { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <h1>Manga Localization — Overlay Viewer</h1>
    <div class="meta" id="meta">Loading…</div>
  </header>
  <div id="root" class="wrap"></div>

  <script>
    const root = document.getElementById("root");
    const meta = document.getElementById("meta");

    function showHint(msg) {
      root.innerHTML =
        '<div class="hint"><b>No data loaded.</b><br>' + msg +
        '<br><br>Pass the overlay JSON via the <code>?data=</code> query parameter, e.g.<br>' +
        '<code>viewer.html?data=../data/output/5.overlay.json</code></div>';
      meta.textContent = "";
    }
    function showError(msg) {
      root.innerHTML = '<div class="err">' + msg + '</div>';
    }

    async function main() {
      const params = new URLSearchParams(location.search);
      const dataParam = params.get("data");
      if (!dataParam) { showHint("Nothing to render yet."); return; }

      const dataUrl = new URL(dataParam, location.href);
      let doc;
      try {
        const res = await fetch(dataUrl, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status + " for " + dataUrl);
        doc = await res.json();
      } catch (e) {
        showError("Failed to load overlay JSON:\n" + e +
          "\n\nIf you opened this file directly (file://), browsers block fetch().\n" +
          "Serve over http instead — see instructions printed by the pipeline.");
        return;
      }

      const W = doc.image_width, H = doc.image_height;
      const imgUrl = new URL(doc.image, dataUrl);   // image is relative to the JSON

      const stage = document.createElement("div");
      stage.id = "stage";
      stage.style.width = W + "px";
      stage.style.height = H + "px";

      const img = document.createElement("img");
      img.src = imgUrl;
      img.width = W; img.height = H;
      stage.appendChild(img);

      for (const b of (doc.bubbles || [])) {
        const c = b.coordinates;
        const x = Math.min(c.x1, c.x2), y = Math.min(c.y1, c.y2);
        const w = Math.abs(c.x2 - c.x1), h = Math.abs(c.y2 - c.y1);
        const div = document.createElement("div");
        div.className = "bubble";
        div.setAttribute("dir", "rtl");
        div.setAttribute("lang", doc.target_lang || "ar");
        div.style.left = x + "px";
        div.style.top = y + "px";
        div.style.width = w + "px";
        div.style.height = h + "px";
        // simple heuristic font-size based on bubble height
        div.style.fontSize = Math.max(11, Math.min(28, Math.round(h / 4))) + "px";
        div.title = b.japanese_text || "";
        div.textContent = b.arabic_text || "";
        stage.appendChild(div);
      }

      root.appendChild(stage);

      // Scale the stage to fit the viewport width (never upscale past 1x).
      function fit() {
        const avail = root.clientWidth - 0;
        const scale = Math.min(1, avail / W);
        stage.style.transform = "scale(" + scale + ")";
        // reserve layout height for the scaled stage
        root.style.height = (H * scale + 40) + "px";
      }
      fit();
      window.addEventListener("resize", fit);

      const m = doc.manifest || {};
      meta.innerHTML =
        "image: <code>" + (doc.image || "?") + "</code> · " +
        (doc.bubbles ? doc.bubbles.length : 0) + " bubbles · " +
        "lang: <code>" + (doc.target_lang || "?") + "</code> · " +
        "sha256: <code>" + (m.output_image_sha256 ? m.output_image_sha256.slice(0, 12) + "…" : "?") + "</code> · " +
        (m.timestamp || "");
    }

    main();
  </script>
</body>
</html>
